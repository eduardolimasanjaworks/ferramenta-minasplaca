# iagmx.sanjaworks.com — IA Atendimento GMX
# HTTPS público: 443 (sslh) → 127.0.0.1:4443

upstream iagmx_app {
    server 127.0.0.1:8095;
}

upstream iagmx_evolution {
    server 127.0.0.1:8094;
}

server {
    listen 80;
    server_name iagmx.sanjaworks.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 4443 ssl;
    server_name iagmx.sanjaworks.com;

    ssl_certificate /etc/letsencrypt/live/iagmx.sanjaworks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iagmx.sanjaworks.com/privkey.pem;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Evolution API (manager + endpoints)
    location /evo/ {
        proxy_pass http://iagmx_evolution/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
        proxy_connect_timeout 60s;
        client_max_body_size 50m;
    }

    # Webhook e API da aplicação
    location /webhook/ {
        proxy_pass http://iagmx_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 50m;
    }

    location /api/ {
        proxy_pass http://iagmx_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /health {
        proxy_pass http://iagmx_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Painel web (raiz)
    location / {
        proxy_pass http://iagmx_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
